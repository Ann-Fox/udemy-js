<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News app</title>
    <!--Import Google Icon Font-->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <!-- Compiled and minified CSS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css"
    />

    <link type="text/css" rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="light-blue lighten-2">
      <div class="nav-wrapper">
        <a href="#" class="brand-logo center">News App</a>
      </div>
    </nav>

    <div class="search-controls">
      <div class="container">
        <div class="row">
          <div class="col s12 m6">
            <div class="card">
              <form name="newsControls">
                <div class="card-content">
                  <div class="card-title">Search news</div>
                  <div class="input-field">
                    <select name="country" id="country">
                      <option value="us">United States</option>
                      <option value="ru">Russia</option>
                      <option value="ua">Ukraine</option>
                    </select>
                    <label>Choose your country</label>
                  </div>
                  <div class="input-field">
                    <select name="category" id="category">
                      <option value="business">business</option>
                      <option value="entertainment">entertainment</option>
                      <option value="general">general</option>
                      <option value="health">health</option>
                      <option value="sports">sports</option>
                      <option value="science">science</option>
                      <option value="sports">sports</option>
                      <option value="technology">technology</option>
                    </select>
                    <label>Choose your country</label>
                  </div>
                  <div class="input-field">
                    <input
                      placeholder="Search"
                      id="autocomplete-input"
                      type="text"
                      class="autocomplete"
                      name="search"
                    />
                    <!-- <label for="autocomplete-input">Search</label> -->
                  </div>

                  <div class="card-action">
                    <button
                      class="waves-effect waves-light btn light-blue accent-3"
                      type="submit"
                      name="action"
                    >
                      <i class="material-icons right">search</i>Search
                    </button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="news-container">
      <div class="container">
        <div class="row grid-container"></div>
      </div>
    </div>

    <!-- Compiled and minified JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

    <script src="app.js"></script>
  </body>
</html>
